services:
  - type: web
    name: greenvolt-api
    runtime: docker
    dockerfilePath: ./apps/api-server/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # auto-generated by Render
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false          # set to your Vercel frontend URLs, comma-separated
