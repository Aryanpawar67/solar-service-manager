version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: solar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: solar_secret
      POSTGRES_DB: solar_service_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
